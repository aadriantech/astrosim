# Event catalog: handler semantics for scenario-declared events.
# Unknown event names are allowed in scenarios; only listed events are contract-tested.

events:
  isru_ramp_up:
    handler: active
    description: >
      Multiplies regolith_throughput_kg_h by 1 + 0.5*boost from payload;
      sets isru_ramp_active in parameters and event.* flags from payload.

  crew_rotation:
    handler: active
    description: >
      Sets crew_rotation_active; increases water_recovery_rate by 0.02 (max 0.99).
      Optional duration_hours clears crew_rotation_active when elapsed (rate not reverted).

  dust_storm:
    handler: active
    description: >
      Reduces solar_capacity_factor by 0.5*severity (severity from payload or alert*0.3).
      Optional duration_hours restores original CF when elapsed; permanent if omitted.