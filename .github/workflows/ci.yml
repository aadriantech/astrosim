name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,optimize]"

      - name: Check agent memory
        run: bash scripts/check_agent_sync.sh

      - name: Run tests with coverage gate
        run: pytest -q --cov=astrosim --cov-fail-under=80

      - name: Smoke test examples
        run: bash scripts/smoke_examples.sh

      - name: Smoke custom subsystem and mars MC
        run: |
          bash scripts/smoke_custom_subsystem.sh
          bash scripts/smoke_mars_quick.sh

      - name: Build wheel smoke
        run: bash scripts/smoke_wheel.sh